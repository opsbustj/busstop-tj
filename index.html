<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kondisi Bus Stop</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet-heat@0.2.0/dist/leaflet-heat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <script>tailwind.config = { theme: { extend: { colors: { tjblue: '#06367c', tjorange: '#F2A900' } } } }</script>
    <style>
        html, body { height: 100%; margin: 0; background-color: #f8fafc; font-family: 'PT Sans', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 10; }
        .custom-popup .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 12px; border: none; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .custom-popup .leaflet-popup-content { margin: 0; width: 300px !important; }
        @media (min-width: 768px) { .custom-popup .leaflet-popup-content { width: 340px !important; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .legend-item { transition: all 0.2s ease-in-out; }
        .legend-item:hover { transform: translateX(5px); }
        
        /* CSS Widget Layer Custom di Kanan Bawah */
        .custom-layer-control {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
            padding: 12px 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: 1px solid #e2e8f0; font-family: 'PT Sans', sans-serif; min-width: 220px;
        }
        .layer-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed #e2e8f0; }
        .layer-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .layer-toggle { cursor: pointer; color: #06367c; transition: color 0.2s; font-size: 16px; width: 25px; text-align: center; }
        .layer-toggle:hover { color: #F2A900; }
        .layer-toggle.off { color: #94a3b8; }
        .layer-label { flex-grow: 1; margin-left: 10px; font-weight: bold; font-size: 12px; color: #334155; }
        
        /* Magic CSS untuk Diagram Pie Klaster */
        .pie-cluster {
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 3px solid white; transition: transform 0.2s;
        }
        .pie-cluster:hover { transform: scale(1.15); z-index: 1000; }
        .pie-inner {
            background-color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #06367c;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="bg-tjblue text-white shadow-xl z-50 flex justify-between items-center px-3 md:px-6 py-2 md:py-3 shrink-0">
        <div class="flex items-center w-3/4 md:w-auto">
            <button onclick="toggleSidebar()" class="mr-3 md:mr-4 hover:text-tjorange transition p-1 text-lg md:text-xl"><i class="fa-solid fa-bars"></i></button>
            <img src="TJ-Putih.png" alt="Logo Transjakarta" class="h-6 md:h-10 drop-shadow-md shrink-0">
            <div class="min-w-0 ml-2 md:ml-4">
                <h1 class="font-bold text-sm md:text-xl leading-tight tracking-wide truncate">Dashboard Kondisi Bus Stop</h1>
                <p class="text-[8px] md:text-xs text-blue-200 font-bold tracking-widest uppercase opacity-90 truncate">Layanan Mikrotrans dan Non-BRT</p>
            </div>
        </div>
        <div id="loading-badge" class="px-2 md:px-5 py-1 md:py-2 text-[9px] md:text-xs bg-tjorange text-tjblue font-bold rounded-full animate-pulse shadow-md flex items-center shrink-0">
            <i class="fa-solid fa-satellite-dish mr-1 md:mr-2 animate-spin"></i> <span class="hidden md:inline">Mensinkronisasi Data...</span><span class="inline md:hidden">Sync...</span>
        </div>
    </header>

    <div class="flex flex-col md:flex-row flex-1 overflow-hidden relative">
        <aside id="sidebar" class="w-full md:w-[26rem] md:min-w-[20rem] md:max-w-[40rem] h-[55vh] md:h-full bg-white shadow-2xl z-40 flex flex-col border-t md:border-r border-gray-200 shrink-0 relative order-2 md:order-1 transition-all duration-300">
            <div class="p-4 md:p-6 flex-1 overflow-y-auto overflow-x-hidden space-y-5 md:space-y-6">
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-[11px] md:text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5"><i class="fa-solid fa-magnifying-glass mr-1.5 text-tjblue"></i> Cari Nama Halte</label>
                        <input type="text" id="search-input" oninput="processAndRenderLayers()" placeholder="Ketik Nama Halte..." class="w-full text-sm px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:border-tjblue focus:ring-2 focus:ring-blue-100 outline-none transition shadow-inner">
                    </div>
                    <div>
                        <label class="block text-[11px] md:text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5"><i class="fa-solid fa-route mr-1.5 text-tjblue"></i> Cari Rute</label>
                        <input type="text" id="route-input" oninput="processAndRenderLayers()" placeholder="JAK.10 atau 6K..." class="w-full text-sm px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:border-tjblue focus:ring-2 focus:ring-blue-100 outline-none transition shadow-inner">
                    </div>
                </div>

                <div class="pt-2 border-t border-gray-100 space-y-3">
                    <h4 class="text-[11px] md:text-xs font-bold uppercase tracking-wider text-gray-500"><i class="fa-solid fa-filter mr-1.5 text-tjorange"></i> Filter Wilayah Administrasi</h4>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[9px] md:text-[10px] font-bold text-tjblue uppercase mb-1">Kab/Kota</label>
                            <select id="filter-kab" onchange="updateDistrictFilter()" class="w-full text-[11px] px-3 py-2 border border-gray-200 rounded focus:border-tjblue focus:ring-1 focus:ring-blue-100 outline-none transition cursor-pointer"><option value="ALL">Semua</option></select>
                        </div>
                        <div>
                            <label class="block text-[9px] md:text-[10px] font-bold text-tjblue uppercase mb-1">Kecamatan</label>
                            <select id="filter-kec" onchange="updateKelurahanFilter()" class="w-full text-[11px] px-3 py-2 border border-gray-200 rounded focus:border-tjblue focus:ring-1 focus:ring-blue-100 outline-none transition cursor-pointer"><option value="ALL">Semua</option></select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[9px] md:text-[10px] font-bold text-tjblue uppercase mb-1">Kelurahan</label>
                        <select id="filter-kel" onchange="processAndRenderLayers()" class="w-full text-[11px] px-3 py-2 border border-gray-200 rounded focus:border-tjblue focus:ring-1 focus:ring-blue-100 outline-none transition cursor-pointer"><option value="ALL">Semua</option></select>
                    </div>
                </div>

                <div class="pt-2 border-t border-gray-100 space-y-2">
                    <label class="block text-[11px] md:text-xs font-bold uppercase tracking-wider text-gray-500"><i class="fa-solid fa-layer-group mr-1.5 text-tjblue"></i> Lihat Persebaran Dari:</label>
                    <select id="view-mode" onchange="resetLegendAndFilter()" class="w-full text-sm px-4 py-2.5 border-2 border-gray-200 rounded-lg text-gray-800 font-bold focus:border-tjorange focus:ring-0 outline-none cursor-pointer shadow-sm transition bg-blue-50">
                        <option value="E">Ketersediaan Bus Stop</option>
                        <option value="F">Ketersediaan Papan Informasi Rute</option>
                        <option value="G">Kondisi Tempat Tunggu Pelanggan</option>
                        <option value="PRIORITAS" class="font-bold text-red-600">🔥 Matriks Prioritas Intervensi</option>
                    </select>
                </div>

                <div class="pt-1 md:pt-2">
                    <div class="flex justify-between items-end mb-3 border-b border-gray-200 pb-2">
                        <h3 class="text-[11px] md:text-xs font-bold text-gray-500 uppercase"><i class="fa-solid fa-list-check mr-1"></i> Keterangan</h3>
                        <span class="text-[10px] md:text-[11px] font-bold text-tjblue bg-blue-50 px-2.5 py-1 rounded">Total: <span id="score-total">0</span> Titik</span>
                    </div>
                    <div id="map-legend" class="space-y-2 md:space-y-2.5"></div>
                </div>

            </div>
            <div id="drag-handle" class="hidden md:block absolute top-0 right-0 w-2 h-full cursor-col-resize bg-transparent hover:bg-blue-100 active:bg-blue-200 z-50"></div>
        </aside>

        <main class="w-full h-[45vh] md:h-full md:flex-1 relative bg-gray-100 order-1 md:order-2 shrink-0 md:shrink z-10 flex flex-col min-w-[30%]">
            <div id="hierarchy-indicator" class="absolute top-4 left-1/2 transform -translate-x-1/2 z-[1000] bg-tjblue text-white px-4 py-1.5 rounded-full shadow-lg text-[10px] md:text-xs font-bold flex items-center border border-blue-400 opacity-90 transition-opacity">
                <i class="fa-solid fa-magnifying-glass-location mr-2 text-tjorange animate-pulse"></i>
                Klaster: <span id="indicator-level" class="ml-1 font-extrabold uppercase">Memuat...</span>
            </div>
            <div id="map" class="flex-1 w-full h-full"></div>
            
            <div class="hidden md:block absolute top-5 right-5 z-[1000]">
                <div id="chart-panel-content" class="w-[340px] bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl p-5 border border-gray-100 relative transition-all duration-300">
                    <button onclick="toggleChart()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
                    <h3 class="text-xs font-bold text-tjblue uppercase tracking-wide text-center mb-1 pr-4">Proporsi Keseluruhan</h3>
                    <p id="chart-subtitle" class="text-[10px] text-gray-400 text-center uppercase tracking-widest mb-4 pr-4">Berdasarkan Bus Stop</p>
                    <div class="relative w-full min-h-[250px] flex justify-center items-center"><canvas id="donutChart"></canvas></div>
                </div>
                <button id="show-chart-btn" onclick="toggleChart()" class="hidden bg-white hover:bg-gray-50 text-tjblue font-bold px-4 py-2.5 rounded-lg shadow-xl border border-gray-200 transition">
                    <i class="fa-solid fa-chart-pie mr-2 text-tjorange"></i>Tampilkan Grafik
                </button>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwAD4YTgVlPdQppFyoyjB_DBsgMq6iLmkQ8gK2YraHaXKxsofp80iBfxF1AEctSz9tP/exec";

        let map, allData = [];
        let currentChart = null, activeLegendFilter = null; 
        let globalAvgDemand = 0; 
        
        let boundaryData = { kabupaten: null, kecamatan: null, kelurahan: null };
        
        let heatLayer = null; 
        let isBusStopVisible = true;
        let isHeatmapVisible = false;

        let polyLayerKab = L.layerGroup(); let polyLayerKec = L.layerGroup(); let polyLayerKel = L.layerGroup(); let polyLayerLineDesa = L.layerGroup(); 
        
        // Peta Warna untuk Render Gradient Pie Chart
        const colorHexMap = {
            'bg-red-500': '#ef4444', 'bg-red-600': '#dc2626', 'bg-orange-500': '#f97316',
            'bg-yellow-400': '#facc15', 'bg-green-500': '#22c55e', 'bg-purple-500': '#a855f7', 'bg-gray-300': '#d1d5db'
        };

        // FUNGSI PEMBUAT DIAGRAM PIE CSS
        function buildPieChartHTML(colorsCountObj, totalCount, outerSizeCls, innerSizeCls, fontSize) {
            let gradientStr = "";
            let currentPercentage = 0;
            
            // Urutkan dari yang terbesar agar proporsinya rapi
            let sortedColors = Object.entries(colorsCountObj).sort((a, b) => b[1] - a[1]);
            
            sortedColors.forEach(([bgClass, count], index) => {
                let hexColor = colorHexMap[bgClass] || '#06367c'; // Default fallback
                let pct = (count / totalCount) * 100;
                gradientStr += `${hexColor} ${currentPercentage}% ${currentPercentage + pct}%`;
                if (index < sortedColors.length - 1) gradientStr += ", ";
                currentPercentage += pct;
            });

            return `
                <div class="pie-cluster ${outerSizeCls}" style="background: conic-gradient(${gradientStr});">
                    <div class="pie-inner ${innerSizeCls} shadow-inner" style="font-size: ${fontSize};">
                        ${totalCount}
                    </div>
                </div>`;
        }

        let layerAdminKab = L.layerGroup(); let layerAdminKec = L.layerGroup(); let layerAdminKel = L.layerGroup();
        
        let layerTitikDetil = L.markerClusterGroup({
            chunkedLoading: true, maxClusterRadius: 4, disableClusteringAtZoom: 18, 
            iconCreateFunction: function(cluster) {
                const markers = cluster.getAllChildMarkers();
                let counts = {};
                markers.forEach(m => {
                    const bg = m.options.customBg || "bg-tjblue";
                    counts[bg] = (counts[bg] || 0) + 1;
                });
                return L.divIcon({ 
                    html: buildPieChartHTML(counts, cluster.getChildCount(), 'w-10 h-10', 'w-8 h-8', '11px'), 
                    className: '', iconSize: L.point(40, 40) 
                });
            }
        });

        Chart.register(ChartDataLabels);

        const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' });
        const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' });
        const googleStreets = L.tileLayer('http://mt0.google.com/vt/lyrs=m&hl=en&x={x}&y={y}&z={z}', { attribution: '© Google Maps' });
        const googleSat = L.tileLayer('http://mt0.google.com/vt/lyrs=s&hl=en&x={x}&y={y}&z={z}', { attribution: '© Google Satellite' });

        const jabodetabekBounds = L.latLngBounds(L.latLng(-6.8, 106.5), L.latLng(-5.9, 107.2));
        map = L.map('map', { maxZoom: 18, minZoom: 10, maxBounds: jabodetabekBounds, maxBoundsViscosity: 1.0, zoomControl: false, layers: [cartoLight] }).setView([-6.2088, 106.8456], 12);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // =====================================================================
        // CUSTOM WIDGET LAYER CONTROL (Menggantikan bawaan Leaflet)
        // =====================================================================
        let currentBasemap = cartoLight;
        
        L.Control.CustomLayers = L.Control.extend({
            onAdd: function(map) {
                let div = L.DomUtil.create('div', 'custom-layer-control leaflet-control');
                L.DomEvent.disableClickPropagation(div);
                L.DomEvent.disableScrollPropagation(div);

                div.innerHTML = `
                    <div class="layer-row">
                        <i id="toggle-busstop" class="fa-solid fa-eye layer-toggle" title="Matikan/Nyalakan Bus Stop" onclick="toggleBusStopLayer()"></i>
                        <span class="layer-label text-tjblue"><i class="fa-solid fa-map-pin mr-1"></i> Data Bus Stop</span>
                    </div>
                    <div class="layer-row">
                        <i id="toggle-heatmap" class="fa-solid fa-eye-slash layer-toggle off" title="Matikan/Nyalakan Heatmap" onclick="toggleHeatmapLayer()"></i>
                        <span class="layer-label text-red-600"><i class="fa-solid fa-fire-flame-curved mr-1"></i> Heatmap Laka</span>
                    </div>
                    <div class="layer-row" style="border:none; margin-top: 5px;">
                        <i class="fa-solid fa-layer-group layer-toggle off" style="cursor:default;"></i>
                        <select id="basemap-select" onchange="changeBasemap()" class="layer-label p-1 border rounded w-full bg-gray-50 cursor-pointer outline-none">
                            <option value="light">Carto Light</option>
                            <option value="dark">Carto Dark</option>
                            <option value="street">Google Street</option>
                            <option value="sat">Google Satelit</option>
                        </select>
                    </div>
                `;
                return div;
            }
        });
        new L.Control.CustomLayers({ position: 'bottomright' }).addTo(map);

        window.toggleBusStopLayer = function() {
            isBusStopVisible = !isBusStopVisible;
            const icon = document.getElementById('toggle-busstop');
            if (isBusStopVisible) {
                icon.className = "fa-solid fa-eye layer-toggle";
                updateActiveMapLayer(); // Nyalakan ulang sesuai zoom
            } else {
                icon.className = "fa-solid fa-eye-slash layer-toggle off";
                // Matikan semua layer terkait bus stop
                map.removeLayer(layerAdminKab); map.removeLayer(layerAdminKec); map.removeLayer(layerAdminKel); map.removeLayer(layerTitikDetil);
                map.removeLayer(polyLayerKab); map.removeLayer(polyLayerKec); map.removeLayer(polyLayerKel); map.removeLayer(polyLayerLineDesa);
            }
        };

        window.toggleHeatmapLayer = function() {
            if(!heatLayer) { alert("Data Heatmap sedang dimuat..."); return; }
            isHeatmapVisible = !isHeatmapVisible;
            const icon = document.getElementById('toggle-heatmap');
            if (isHeatmapVisible) {
                icon.className = "fa-solid fa-eye layer-toggle text-red-500";
                map.addLayer(heatLayer);
                // Pindahkan heatmap ke belakang agar titik bus stop tidak tertutup
                if(heatLayer._canvas) heatLayer._canvas.style.zIndex = "300"; 
            } else {
                icon.className = "fa-solid fa-eye-slash layer-toggle off";
                map.removeLayer(heatLayer);
            }
        };

        window.changeBasemap = function() {
            const val = document.getElementById('basemap-select').value;
            map.removeLayer(currentBasemap);
            if(val === 'light') currentBasemap = cartoLight;
            else if(val === 'dark') currentBasemap = cartoDark;
            else if(val === 'street') currentBasemap = googleStreets;
            else if(val === 'sat') currentBasemap = googleSat;
            map.addLayer(currentBasemap);
            currentBasemap.bringToBack();
        };

        const sidebar = document.getElementById('sidebar'), dragHandle = document.getElementById('drag-handle');
        let isResizing = false;
        dragHandle.addEventListener('mousedown', (e) => { isResizing = true; document.body.style.cursor = 'col-resize'; e.preventDefault(); });
        document.addEventListener('mousemove', (e) => { if (!isResizing) return; let newWidth = e.clientX; if (newWidth > 320 && newWidth < window.innerWidth * 0.7) { sidebar.style.width = newWidth + 'px'; if(map) map.invalidateSize(); } });
        document.addEventListener('mouseup', () => { if (isResizing) { isResizing = false; document.body.style.cursor = 'default'; } });

        map.on('zoomend', () => { if(allData.length > 0 && isBusStopVisible) updateActiveMapLayer(); });

        function normName(str) {
            let s = (str || "").toUpperCase();
            if (s.includes("JAKARTA")) s = s.replace(/KOTA ADMINISTRASI\s|KOTA ADM\.\s|KOTA\s/ig, '');
            return s.replace(/KECAMATAN\s|KEC\.\s/ig, '').replace(/KELURAHAN\s|KEL\.\s|DESA\s/ig, '').trim();
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetch(API_URL).then(res => { if (!res.ok) throw new Error("API Google Script menolak."); return res.json(); })
                .then(data => {
                    if(data.error) { alert("Error database: " + data.error); return; }
                    allData = data;
                    
                    let totalD = 0, countD = 0;
                    allData.forEach(d => { if(d.avg_pelanggan > 0) { totalD += d.avg_pelanggan; countD++; } });
                    globalAvgDemand = countD > 0 ? (totalD / countD) : 0;

                    document.getElementById('loading-badge').classList.add('hidden');
                    populateFilterDropdowns(); 
                    loadGeoJsonLayersLazy();
                }).catch(err => { alert("GAGAL MENSINKRONKAN DATA SPREADSHEET:\n" + err.message); document.getElementById('loading-badge').classList.add('hidden'); });
        });

        async function loadGeoJsonLayersLazy() {
            async function pullFile(name) { try { const res = await fetch(name); return res.ok ? await res.json() : null; } catch(e) { return null; } }
            const shpKab = await pullFile('Jakarta_Kabupaten_Kota.geojson'); const shpKec = await pullFile('Jakarta_Kecamatan.geojson');
            const shpKel = await pullFile('Jakarta_Desa.geojson'); const shpKelGaris = await pullFile('Jakarta_Desa_Line.geojson');
            const lakaData = await pullFile('laka_pasif.geojson');

            if(shpKab) {
                boundaryData.kabupaten = shpKab;
                L.geoJSON(shpKab, { style: { color: "#06367c", weight: 2, opacity: 0.8, fillColor: "#06367c", fillOpacity: 0.1 }, onEachFeature: function(f, l) { l.bindTooltip(`<div class="text-[10px] md:text-[11px] font-bold text-tjblue uppercase tracking-widest bg-white/95 px-3 py-1.5 rounded shadow-lg border border-tjblue/20">${f.properties.WADMKK || f.properties.NAMOBJ || "Wilayah"}</div>`, { permanent: false, sticky: true }); } }).addTo(polyLayerKab);
            }
            if(shpKec) {
                boundaryData.kecamatan = shpKec;
                L.geoJSON(shpKec, { style: { color: "#06367c", weight: 2, opacity: 0.8, fillColor: "#06367c", fillOpacity: 0.1 }, onEachFeature: function(f, l) { l.bindTooltip(`<div class="text-[10px] md:text-[11px] font-bold text-tjblue uppercase tracking-widest bg-white/95 px-3 py-1.5 rounded shadow-lg border border-tjblue/20">${f.properties.WADMKC || f.properties.NAMOBJ || "Wilayah"}</div>`, { permanent: false, sticky: true }); } }).addTo(polyLayerKec);
            }
            if(shpKel) {
                boundaryData.kelurahan = shpKel;
                L.geoJSON(shpKel, { style: { color: "#06367c", weight: 2, opacity: 0.8, fillColor: "#06367c", fillOpacity: 0.1 }, onEachFeature: function(f, l) { l.bindTooltip(`<div class="text-[10px] md:text-[11px] font-bold text-tjblue uppercase tracking-widest bg-white/95 px-3 py-1.5 rounded shadow-lg border border-tjblue/20">${f.properties.WADMKD || f.properties.NAMOBJ || "Wilayah"}</div>`, { permanent: false, sticky: true }); } }).addTo(polyLayerKel);
            }
            if(shpKelGaris) L.geoJSON(shpKelGaris, { style: { color: "#06367c", weight: 1.5, opacity: 0.5, dashArray: '5, 5', fill: false } }).addTo(polyLayerLineDesa);

            if(lakaData) {
                let hPts = [];
                lakaData.features.forEach(f => { if(f.geometry && f.geometry.coordinates) hPts.push([f.geometry.coordinates[1], f.geometry.coordinates[0], 1]); });
                heatLayer = L.heatLayer(hPts, {radius: 20, blur: 15, maxZoom: 15, gradient: {0.4: 'blue', 0.6: 'lime', 0.8: 'yellow', 1.0: 'red'}});
            }
            processAndRenderLayers();
        }

        function populateFilterDropdowns() {
            const kabupatenSel = document.getElementById('filter-kab'); kabupatenSel.innerHTML = '<option value="ALL">Semua</option>';
            const kabupatenSet = new Set(); allData.forEach(item => { if(item.kabupaten) kabupatenSet.add(item.kabupaten.trim()); });
            [...kabupatenSet].sort().forEach(kab => { kabupatenSel.add(new Option(kab, kab)); }); updateDistrictFilter();
        }
        function updateDistrictFilter() {
            const kabVal = document.getElementById('filter-kab').value, kecSel = document.getElementById('filter-kec'); kecSel.innerHTML = '<option value="ALL">Semua</option>';
            const kecSet = new Set(); allData.forEach(item => { if((kabVal === 'ALL' || (item.kabupaten && item.kabupaten.trim() === kabVal)) && item.kecamatan) { const name = item.kecamatan.trim(); if(name && name !== "Tanpa Kecamatan") kecSet.add(name); } });
            [...kecSet].sort().forEach(kec => { kecSel.add(new Option(kec, kec)); }); updateKelurahanFilter();
        }
        function updateKelurahanFilter() {
            const kabVal = document.getElementById('filter-kab').value, kecVal = document.getElementById('filter-kec').value, kelSel = document.getElementById('filter-kel'); kelSel.innerHTML = '<option value="ALL">Semua</option>';
            const kelSet = new Set(); allData.forEach(item => { if((kabVal === 'ALL' || (item.kabupaten && item.kabupaten.trim() === kabVal)) && (kecVal === 'ALL' || (item.kecamatan && item.kecamatan.trim() === kecVal)) && item.kelurahan) { const name = item.kelurahan.trim(); if(name && name !== "Tanpa Kelurahan") kelSet.add(name); } });
            [...kelSet].sort().forEach(kel => { kelSel.add(new Option(kel, kel)); }); processAndRenderLayers();
        }

        function toggleLegendFilter(id) { activeLegendFilter = (activeLegendFilter === id) ? null : id; processAndRenderLayers(); }
        function resetLegendAndFilter() { activeLegendFilter = null; processAndRenderLayers(); }
        function toggleSidebar() { sidebar.style.display = sidebar.style.display === 'none' ? 'flex' : 'none'; if(sidebar.style.display==='flex') sidebar.style.width = ''; setTimeout(() => { map.invalidateSize(); }, 50); }
        function toggleChart() { const p = document.getElementById('chart-panel-content'), b = document.getElementById('show-chart-btn'); p.classList.toggle('hidden'); b.classList.toggle('hidden'); }
        window.addEventListener('resize', () => { if(map) map.invalidateSize(); });

        function getSymbology(item, mode) {
            if (mode === 'PRIORITAS') {
                let supply = (item.kondisiE || "").toLowerCase();
                let isBuruk = supply.includes("tidak ada") || supply.includes("rusak") || supply.includes("terhalang");
                let isTinggi = item.avg_pelanggan >= globalAvgDemand;
                if (isBuruk && isTinggi) return { id: "p1", label: "Prioritas Kritis (Fasilitas Buruk, Penumpang Ramai)", bg: "bg-red-600", text: "text-white", hex: "#dc2626", icon: "fa-triangle-exclamation" };
                if (isBuruk && !isTinggi) return { id: "p2", label: "Prioritas Kedua (Fasilitas Buruk, Penumpang Sepi)", bg: "bg-orange-500", text: "text-white", hex: "#f97316", icon: "fa-wrench" };
                if (!isBuruk && isTinggi) return { id: "p3", label: "Kondisi Ideal (Fasilitas Baik, Penumpang Ramai)", bg: "bg-green-500", text: "text-white", hex: "#22c55e", icon: "fa-check-double" };
                if (!isBuruk && !isTinggi) return { id: "p4", label: "Underutilized (Fasilitas Baik, Penumpang Sepi)", bg: "bg-purple-500", text: "text-white", hex: "#a855f7", icon: "fa-arrow-trend-down" };
            }

            let text = "";
            if (mode === 'E') text = (item.kondisiE || "").toLowerCase();
            else if (mode === 'F') text = (item.kondisiF || "").toLowerCase();
            else if (mode === 'G') text = (item.kondisiG || "").toLowerCase();

            if (mode === 'E' || mode === 'F' || mode === 'G') {
                if (text.includes("tidak ada") && mode !== 'G') return { id: "e1", label: "Tidak Ada / Tidak Tersedia", bg: "bg-red-500", text: "text-white", hex: "#ef4444", icon: "fa-exclamation" };
                if (mode === 'G' && text.includes("berbahaya")) return { id: "g1", label: "Berbahaya Untuk Berhenti", bg: "bg-red-500", text: "text-white", hex: "#ef4444", icon: "fa-bus-simple" }; 
                if (text.includes("terhalang") || text.includes("penerangan") || text.includes("kriminalitas")) return { id: "e2", label: "Rawan / Terhalang", bg: "bg-orange-500", text: "text-white", hex: "#f97316", icon: "fa-ban" };
                if (text.includes("rusak") || text.includes("bocor") || text.includes("pinggir")) return { id: "e3", label: "Rusak / Perlu Perhatian", bg: "bg-yellow-400", text: "text-gray-900", hex: "#facc15", icon: "fa-wrench" };
                if (text.includes("baik") || text.includes("ada") || text.includes("aman")) return { id: "e4", label: "Kondisi Baik / Aman", bg: "bg-green-500", text: "text-white", hex: "#22c55e", icon: "fa-check" };
            }
            return { id: "unk", label: "Data Tidak Spesifik", bg: "bg-gray-300", text: "text-gray-700", hex: "#d1d5db", icon: "fa-circle-question" };
        }

        function processAndRenderLayers() {
            const searchVal = document.getElementById('search-input').value.toLowerCase(), routeVal = document.getElementById('route-input').value.toLowerCase(); 
            const kabVal = document.getElementById('filter-kab').value, kecVal = document.getElementById('filter-kec').value, kelVal = document.getElementById('filter-kel').value;
            const viewMode = document.getElementById('view-mode').value;
            
            const modeNames = { 'E': 'Ketersediaan Bus Stop', 'F': 'Papan Informasi Rute', 'G': 'Kondisi Tempat Tunggu', 'PRIORITAS': 'Matriks Prioritas Intervensi' };
            document.getElementById('chart-subtitle').innerText = "Berdasarkan " + modeNames[viewMode];

            layerAdminKab.clearLayers(); layerAdminKec.clearLayers(); layerAdminKel.clearLayers(); layerTitikDetil.clearLayers(); 
            let countTotalSearched = 0, countMapRendered = 0, summaryStats = {}, grupKab = {}, grupKec = {}, grupKel = {};

            allData.forEach(item => {
                const matchS = !searchVal || item.nama.toLowerCase().includes(searchVal);
                const matchR = !routeVal || (item.rute && item.rute.toLowerCase().includes(routeVal)); 
                const matchKab = kabVal === 'ALL' || (item.kabupaten && item.kabupaten.trim() === kabVal);
                const matchKec = kecVal === 'ALL' || (item.kecamatan && item.kecamatan.trim() === kecVal);
                const matchKel = kelVal === 'ALL' || (item.kelurahan && item.kelurahan.trim() === kelVal);

                if (matchS && matchR && matchKab && matchKec && matchKel) {
                    countTotalSearched++;
                    const sym = getSymbology(item, viewMode);
                    if(!summaryStats[sym.id]) summaryStats[sym.id] = { id: sym.id, label: sym.label, count: 0, hex: sym.hex, bg: sym.bg, text: sym.text, icon: sym.icon };
                    summaryStats[sym.id].count++;

                    if (!activeLegendFilter || activeLegendFilter === sym.id) {
                        countMapRendered++;
                        const htmlIcon = `<div class="w-7 h-7 md:w-8 md:h-8 rounded-full ${sym.bg} ${sym.text} border-2 border-white flex items-center justify-center shadow-lg hover:scale-125 transition-transform"><i class="fa-solid ${sym.icon} text-[11px] md:text-[13px]"></i></div>`;
                        const markerIcon = L.divIcon({ html: htmlIcon, className: '', iconSize: L.point(32,32), iconAnchor: [16,16] });
                        
                        // Pass bg to marker option so MarkerCluster can read it for Pie Chart
                        const marker = L.marker([item.lat, item.lng], { icon: markerIcon, customBg: sym.bg, customText: sym.text });
                        marker.bindPopup(() => createPopupContent(item, sym), { className: 'custom-popup', itemData: item });
                        layerTitikDetil.addLayer(marker);

                        // Agregasi Data-Driven Centroid
                        aggregateDataHierarchy(grupKab, item.kabupaten, item, sym.bg, sym.text);
                        aggregateDataHierarchy(grupKec, item.kecamatan, item, sym.bg, sym.text);
                        aggregateDataHierarchy(grupKel, item.kelurahan, item, sym.bg, sym.text);
                    }
                }
            });

            renderSemanticLayer(layerAdminKab, grupKab, "w-16 h-16 md:w-20 md:h-20", "w-12 h-12 md:w-16 md:h-16", "text-lg md:text-2xl"); 
            renderSemanticLayer(layerAdminKec, grupKec, "w-14 h-14 md:w-16 md:h-16", "w-10 h-10 md:w-12 md:h-12", "text-base md:text-xl"); 
            renderSemanticLayer(layerAdminKel, grupKel, "w-10 h-10 md:w-12 md:h-12", "w-7 h-7 md:w-9 md:h-9", "text-xs md:text-base");
            
            if(isBusStopVisible) updateActiveMapLayer();
            
            document.getElementById('score-total').innerText = activeLegendFilter ? `${countMapRendered} / ${countTotalSearched}` : countTotalSearched;
            updateScorecardAndChart(Object.values(summaryStats).sort((a,b) => b.count - a.count), countTotalSearched); 
        }

        // MENGHITUNG RATA-RATA LOKASI HALTE (DATA-DRIVEN CENTROID)
        function aggregateDataHierarchy(groupObj, rawName, item, bgStr, textStr) {
            let key = normName(rawName || "Lainnya");
            if(!groupObj[key]) groupObj[key] = { latSum: 0, lngSum: 0, count: 0, colors: {} };
            groupObj[key].latSum += parseFloat(item.lat); groupObj[key].lngSum += parseFloat(item.lng); groupObj[key].count++;
            const colorKey = bgStr; // Simpan class background (cth: bg-red-500)
            groupObj[key].colors[colorKey] = (groupObj[key].colors[colorKey] || 0) + 1;
        }

        // RENDER KLASTER SEBAGAI PIE CHART
        function renderSemanticLayer(targetLayerGroup, aggregatedDataObj, outerCls, innerCls, fontCls) {
            for (const key in aggregatedDataObj) {
                const grp = aggregatedDataObj[key];
                // Titik Peta Berdasarkan Rata-Rata Data Halte (Fix Bogor/Satelit City Out-of-bounds)
                const finalLat = grp.latSum / grp.count; 
                const finalLng = grp.lngSum / grp.count;

                const html = buildPieChartHTML(grp.colors, grp.count, outerCls, innerCls, fontCls);
                targetLayerGroup.addLayer(L.marker([finalLat, finalLng], { icon: L.divIcon({ html: html, className: '', iconSize: L.point(80,80), iconAnchor: [40,40] }) }));
            }
        }

        function updateActiveMapLayer() {
            const z = map.getZoom(), levelIndicator = document.getElementById('indicator-level');
            map.removeLayer(layerAdminKab); map.removeLayer(layerAdminKec); map.removeLayer(layerAdminKel); map.removeLayer(layerTitikDetil);
            map.removeLayer(polyLayerKab); map.removeLayer(polyLayerKec); map.removeLayer(polyLayerKel); map.removeLayer(polyLayerLineDesa);

            if (z <= 11) { map.addLayer(polyLayerKab); map.addLayer(layerAdminKab); levelIndicator.innerText = "Kabupaten / Kota"; } 
            else if (z >= 12 && z <= 13) { map.addLayer(polyLayerKec); map.addLayer(layerAdminKec); levelIndicator.innerText = "Kecamatan"; } 
            else if (z === 14) { map.addLayer(polyLayerKel); map.addLayer(layerAdminKel); levelIndicator.innerText = "Kelurahan"; } 
            else { map.addLayer(polyLayerLineDesa); map.addLayer(layerTitikDetil); levelIndicator.innerText = "Mode Titik Detil Individual"; }
        }

        function updateScorecardAndChart(statsArray, totalCount) {
            const legendDiv = document.getElementById('map-legend'); legendDiv.innerHTML = '';
            let chartLabels = [], chartData = [], chartColors = [];

            statsArray.forEach(stat => {
                const percentage = totalCount > 0 ? ((stat.count / totalCount) * 100).toFixed(1) + '%' : '0%';
                const isActive = activeLegendFilter === stat.id;
                const ringClass = isActive ? 'ring-2 ring-tjblue ring-offset-2 bg-blue-50' : 'bg-gray-50';

                legendDiv.innerHTML += `
                    <div onclick="toggleLegendFilter('${stat.id}')" class="legend-item flex items-center justify-between ${ringClass} ${!isActive && activeLegendFilter ? 'opacity-40 grayscale' : ''} p-2 rounded-lg border border-gray-200 cursor-pointer transition-all duration-200">
                        <div class="flex items-center">
                            <div class="w-7 h-7 rounded-full ${stat.bg} ${stat.text} flex justify-center items-center mr-2 shadow-sm shrink-0"><i class="fa-solid ${stat.icon} text-xs"></i></div>
                            <span class="text-[10px] font-bold text-gray-700 w-32 leading-tight pointer-events-none">${stat.label}</span>
                        </div>
                        <div class="text-right pointer-events-none shrink-0"><span class="text-base font-bold ${stat.text === 'text-white' ? stat.bg.replace('bg-', 'text-') : 'text-gray-900'} leading-none">${stat.count}</span><span class="block text-[9px] text-gray-400 font-bold mt-0.5">${percentage}</span></div>
                    </div>`;
                chartLabels.push(stat.label); chartData.push(stat.count); chartColors.push(stat.hex);
            });

            const canvasWrapper = document.getElementById('chart-panel-content').parentElement;
            if(window.getComputedStyle(canvasWrapper).display !== 'none') {
                const ctx = document.getElementById('donutChart').getContext('2d');
                if (currentChart) currentChart.destroy(); 
                currentChart = new Chart(ctx, { type: 'doughnut', data: { labels: chartLabels, datasets: [{ data: chartData, backgroundColor: chartColors, borderWidth: 2, borderColor: '#ffffff', hoverOffset: 6 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '55%', plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 12, padding: 10, font: { size: 11, family: 'PT Sans', weight: 'bold' }, color: '#4b5563' } }, datalabels: { color: '#ffffff', font: { weight: 'bold', size: 12, family: 'PT Sans' }, formatter: (value, ctx) => { let sum = 0; ctx.chart.data.datasets[0].data.map(d => { sum += d; }); return value === 0 ? '' : (value * 100 / sum).toFixed(1) + "%"; } } } } });
            }
        }

        map.on('popupopen', function(e) {
            let item = e.popup.options.itemData;
            if(!item) return;
            setTimeout(() => {
                let canvas = document.getElementById('chart-' + item.rowId);
                if(canvas) {
                    new Chart(canvas.getContext('2d'), {
                        type: 'line',
                        data: {
                            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei'],
                            datasets: [{ label: 'Pelanggan/Hari', data: [item.avg_jan, item.avg_feb, item.avg_mar, item.avg_apr, item.avg_mei], borderColor: '#06367c', backgroundColor: 'rgba(6, 54, 124, 0.1)', borderWidth: 2, fill: true, tension: 0.4, pointRadius: 3 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: {display: false}, datalabels: {display: false} }, scales: { x: {display: true, ticks:{font:{size:9}}}, y: {display: false, beginAtZero: true} } }
                    });
                }
            }, 50);
        });

        function createPopupContent(item, sym) {
            let fixLink = item.dokumentasi;
            let btnDokumentasi = `<div class="flex-1 flex justify-center items-center text-[10px] text-gray-400 italic bg-gray-50 border-t border-gray-100 p-2">Foto tak tersedia</div>`;
            if(fixLink && fixLink.length > 5) { if(!fixLink.startsWith('http://') && !fixLink.startsWith('https://')) fixLink = 'https://' + fixLink; btnDokumentasi = `<a href="${fixLink}" target="_blank" rel="noopener noreferrer" class="flex-1 flex justify-center items-center bg-tjblue hover:bg-blue-800 text-white font-bold py-2.5 md:py-3 text-[10px] md:text-[11px] uppercase tracking-widest transition"><i class="fa-solid fa-camera mr-1.5"></i> Foto</a>`; }
            const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lng}`;
            const btnDirections = `<a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" class="flex-1 flex justify-center items-center bg-tjorange hover:bg-yellow-500 text-tjblue font-bold py-2.5 md:py-3 text-[10px] md:text-[11px] uppercase tracking-widest transition border-r border-white/20"><i class="fa-solid fa-route mr-1.5"></i> Navigasi</a>`;

            let trendIcon = item.avg_mei > item.avg_jan ? '<i class="fa-solid fa-arrow-trend-up text-green-500"></i>' : '<i class="fa-solid fa-arrow-trend-down text-red-500"></i>';

            return `
                <div class="flex flex-col bg-white rounded-xl font-['PT_Sans']">
                    <div class="${sym.bg} ${sym.text} px-4 py-3 flex items-center justify-between rounded-t-xl"><div class="pr-2"><h4 class="font-bold text-[13px] md:text-[15px] uppercase tracking-wider mb-1">${item.nama}</h4><span class="inline-block bg-white/20 backdrop-blur-sm text-${sym.text} text-[9px] md:text-[11px] px-2 py-0.5 rounded shadow-sm border border-white/30"><i class="fa-solid fa-route mr-1.5"></i>RUTE: <strong class="font-bold">${item.rute || '-'}</strong></span></div><div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white/20 flex items-center justify-center shrink-0 border border-white/40 shadow-inner"><i class="fa-solid ${sym.icon} text-lg md:text-xl"></i></div></div>
                    
                    <div class="px-4 py-3 bg-blue-50 border-b border-gray-200">
                        <div class="flex justify-between items-start mb-2 border-b border-blue-100 pb-2">
                            <div class="flex flex-col">
                                <span class="font-bold text-tjblue uppercase text-[10px] mb-1"><i class="fa-solid fa-users mr-1"></i> Data Pelanggan</span>
                                <span class="font-bold text-[13px] text-tjblue">${trendIcon} ${item.avg_pelanggan} <span class="text-[9px] text-gray-500 font-normal">org/hari</span></span>
                            </div>
                            <div class="flex flex-col text-right">
                                <span class="text-gray-500 text-[9px] font-bold mb-1">HARI TERPADAT:</span>
                                <span class="font-bold text-tjorange text-[11px] uppercase">${item.hari_terpadat || '-'}</span>
                            </div>
                        </div>
                        <div class="w-full h-20 relative"><canvas id="chart-${item.rowId}"></canvas></div>
                    </div>

                    <div class="px-4 py-3 text-[11px] md:text-[12px] text-gray-600 space-y-2 bg-white">
                        <div class="flex flex-col border-b border-gray-100 pb-1.5"><span class="font-bold text-gray-400 uppercase tracking-wider text-[9px] md:text-[10px]">Administrasi</span><span class="font-bold text-tjblue text-[11px] md:text-[12px]"><i class="fa-solid fa-map-location-dot mr-1.5 opacity-60"></i> ${item.lokasi || `Kel. ${item.kelurahan}, Kec. ${item.kecamatan}, ${item.kabupaten}`}</span></div>
                        <div class="flex flex-col border-b border-gray-100 pb-1.5"><span class="font-bold text-gray-400 uppercase tracking-wider">Bus Stop (E)</span><span class="font-bold text-gray-800 text-[12px] md:text-[13px]">${item.kondisiE || '-'}</span></div>
                        <div class="flex flex-col border-b border-gray-100 pb-1.5"><span class="font-bold text-gray-400 uppercase tracking-wider">Papan Rute (F)</span><span class="font-bold text-gray-800 text-[12px] md:text-[13px]">${item.kondisiF || '-'}</span></div>
                        <div class="flex flex-col"><span class="font-bold text-gray-400 uppercase tracking-wider">Area Tunggu (G)</span><span class="font-bold text-gray-800 text-[12px] md:text-[13px]">${item.kondisiG || '-'}</span></div>
                    </div>
                    <div class="flex w-full rounded-b-xl overflow-hidden">${btnDirections}${btnDokumentasi}</div>
                </div>`;
        }
    </script>
</body>
</html>
