<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kondisi Bus Stop</title>
    
    <link rel="icon" type="image/png" href="favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <script>
        tailwind.config = { theme: { extend: { colors: { tjblue: '#06367c', tjorange: '#F2A900' } } } }
    </script>
    <style>
        html, body { height: 100%; margin: 0; background-color: #f8fafc; font-family: 'PT Sans', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 10; }
        
        .custom-popup .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 12px; border: none; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .custom-popup .leaflet-popup-content { margin: 0; width: 280px !important; }
        @media (min-width: 768px) { .custom-popup .leaflet-popup-content { width: 340px !important; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .legend-item { transition: all 0.2s ease-in-out; }
        .legend-item:hover { transform: translateX(5px); }
        
        .leaflet-control-layers { border-radius: 8px !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important; border: 2px solid #e2e8f0 !important; font-family: 'PT Sans', sans-serif; font-weight: bold; background-color: rgba(255,255,255,0.95) !important; backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="bg-tjblue text-white shadow-xl z-50 flex justify-between items-center px-3 md:px-6 py-2 md:py-3 shrink-0">
        <div class="flex items-center w-3/4 md:w-auto">
            <button onclick="toggleSidebar()" class="mr-3 md:mr-4 hover:text-tjorange transition p-1 text-lg md:text-xl" title="Sembunyikan/Tampilkan Panel">
                <i class="fa-solid fa-bars"></i>
            </button>
            <img src="TJ-Putih.png" alt="Logo Transjakarta" class="h-6 md:h-10 drop-shadow-md shrink-0">
            <div class="min-w-0 ml-2 md:ml-4">
                <h1 class="font-bold text-sm md:text-xl leading-tight tracking-wide truncate">Dashboard Kondisi Bus Stop</h1>
                <p class="text-[8px] md:text-xs text-blue-200 font-bold tracking-widest uppercase opacity-90 truncate">Layanan Mikrotrans dan Non-BRT</p>
            </div>
        </div>
        <div id="loading-badge" class="px-2 md:px-5 py-1 md:py-2 text-[9px] md:text-xs bg-tjorange text-tjblue font-bold rounded-full animate-pulse shadow-md flex items-center shrink-0">
            <i class="fa-solid fa-satellite-dish mr-1 md:mr-2 animate-spin"></i> 
            <span class="hidden md:inline">Mensinkronisasi Data...</span>
            <span class="inline md:hidden">Sync...</span>
        </div>
    </header>

    <div class="flex flex-col md:flex-row flex-1 overflow-hidden relative">
        
        <aside id="sidebar" class="w-full md:w-[26rem] md:min-w-[20rem] md:max-w-[40rem] md:resize-x h-[55vh] md:h-full bg-white shadow-2xl z-40 flex flex-col border-t md:border-t-0 md:border-r border-gray-200 shrink-0 relative order-2 md:order-1 transition-all duration-300">
            <div class="p-4 md:p-6 flex-1 overflow-y-auto overflow-x-hidden space-y-5 md:space-y-6">
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-[11px] md:text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5"><i class="fa-solid fa-magnifying-glass mr-1.5 text-tjblue"></i> Cari Nama Halte</label>
                        <input type="text" id="search-input" oninput="applyFilters()" placeholder="Ketik Nama Halte..." class="w-full text-sm px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:border-tjblue focus:ring-2 focus:ring-blue-100 outline-none transition shadow-inner">
                    </div>
                    <div>
                        <label class="block text-[11px] md:text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5"><i class="fa-solid fa-route mr-1.5 text-tjblue"></i> Cari Berdasarkan Rute</label>
                        <input type="text" id="route-input" oninput="applyFilters()" placeholder="Ketik Rute (Contoh: JAK.10 atau 6K)..." class="w-full text-sm px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:border-tjblue focus:ring-2 focus:ring-blue-100 outline-none transition shadow-inner">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[11px] md:text-xs font-bold uppercase tracking-wider text-gray-500"><i class="fa-solid fa-layer-group mr-1.5 text-tjblue"></i> Lihat Persebaran Dari:</label>
                    <select id="view-mode" onchange="resetLegendAndFilter()" class="w-full text-sm px-4 py-2.5 border-2 border-gray-200 rounded-lg text-gray-800 font-bold focus:border-tjorange focus:ring-0 outline-none cursor-pointer shadow-sm transition">
                        <option value="E">Ketersediaan Bus Stop</option>
                        <option value="F">Ketersediaan Papan Informasi Rute</option>
                        <option value="G">Kondisi Tempat Tunggu Pelanggan</option>
                    </select>
                </div>

                <div class="pt-1 md:pt-2">
                    <div class="flex justify-between items-end mb-3 border-b border-gray-200 pb-2">
                        <h3 class="text-[11px] md:text-xs font-bold text-gray-500 uppercase"><i class="fa-solid fa-list-check mr-1"></i> Keterangan</h3>
                        <span class="text-[10px] md:text-[11px] font-bold text-tjblue bg-blue-50 px-2.5 py-1 rounded">Total: <span id="score-total">0</span> Titik</span>
                    </div>
                    <div id="map-legend" class="space-y-2 md:space-y-2.5">
                        </div>
                </div>

            </div>
            
            <div id="drag-handle" class="hidden md:block absolute top-0 right-0 w-2 h-full cursor-col-resize bg-transparent hover:bg-blue-100 active:bg-blue-200 z-50 transition-colors"></div>
        </aside>

        <main class="w-full h-[45vh] md:h-full md:flex-1 relative bg-gray-100 order-1 md:order-2 shrink-0 md:shrink z-10 flex flex-col min-w-[30%]">
            <div id="map" class="flex-1 w-full h-full"></div>
            
            <div class="hidden md:block absolute top-5 right-5 z-[1000]">
                <div id="chart-panel-content" class="w-[340px] bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl p-5 border border-gray-100 relative transition-all duration-300">
                    <button onclick="toggleChart()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition" title="Sembunyikan Grafik">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                    <h3 class="text-xs font-bold text-tjblue uppercase tracking-wide text-center mb-1 pr-4">Proporsi Keseluruhan</h3>
                    <p id="chart-subtitle" class="text-[10px] text-gray-400 text-center uppercase tracking-widest mb-4 pr-4">Berdasarkan Bus Stop</p>
                    <div class="relative w-full min-h-[250px] flex justify-center items-center">
                        <canvas id="donutChart"></canvas>
                    </div>
                </div>
                <button id="show-chart-btn" onclick="toggleChart()" class="hidden bg-white hover:bg-gray-50 text-tjblue font-bold px-4 py-2.5 rounded-lg shadow-xl border border-gray-200 transition">
                    <i class="fa-solid fa-chart-pie mr-2 text-tjorange"></i>Tampilkan Grafik
                </button>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwcE-rC1hubk0ZuYgR9ZjBIKPv7R5lG35YEEl1ajF9Md5-TbXslqgV9SoYMTLCaU5TJ/exec";

        let map, markerCluster, allData = [];
        let currentChart = null;
        let activeLegendFilter = null; 

        Chart.register(ChartDataLabels);

        // PENAMBAHAN BASEMAPS (Termasuk Dark Mode)
        const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' });
        const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' });
        const googleStreets = L.tileLayer('http://mt0.google.com/vt/lyrs=m&hl=en&x={x}&y={y}&z={z}', { attribution: '© Google Maps' });
        const googleSat = L.tileLayer('http://mt0.google.com/vt/lyrs=s&hl=en&x={x}&y={y}&z={z}', { attribution: '© Google Satellite' });
        const osmStandard = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' });

        // BATAS AREA (BOUNDING BOX) JABODETABEK UNTUK MENGHEMAT MEMORI
        const jabodetabekBounds = L.latLngBounds(
            L.latLng(-6.8, 106.5), // Sudut Barat Daya (South West)
            L.latLng(-5.9, 107.2)  // Sudut Timur Laut (North East)
        );

        // INISIALISASI PETA DENGAN MAX BOUNDS DAN MIN ZOOM
        map = L.map('map', { 
            maxZoom: 18, 
            minZoom: 10,                 // Batas Zoom Out Maksimal
            maxBounds: jabodetabekBounds, // Mengunci Peta di Area Jabodetabek
            maxBoundsViscosity: 1.0,      // Efek "membal" jika ditarik keluar area
            zoomControl: false, 
            layers: [cartoLight] 
        }).setView([-6.2088, 106.8456], 12);
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // DAFTAR PILIHAN BASEMAP
        const baseMaps = {
            "Carto Light (Default)": cartoLight,
            "Carto Dark (Peta Gelap)": cartoDark,
            "Google Maps": googleStreets,
            "Google Satellite": googleSat,
            "OpenStreetMap": osmStandard
        };
        L.control.layers(baseMaps, null, { position: 'bottomleft' }).addTo(map);

        markerCluster = L.markerClusterGroup({
            chunkedLoading: true, 
            maxClusterRadius: 55,
            disableClusteringAtZoom: 14, 
            iconCreateFunction: function(cluster) {
                const markers = cluster.getAllChildMarkers();
                let counts = {};
                markers.forEach(m => {
                    const bg = m.options.customBg || "bg-tjblue";
                    const text = m.options.customText || "text-white";
                    counts[`${bg}|${text}`] = (counts[`${bg}|${text}`] || 0) + 1;
                });

                let domStyle = "bg-tjblue|text-white";
                let max = 0;
                for (const [style, count] of Object.entries(counts)) {
                    if (count > max) { max = count; domStyle = style; }
                }
                const [domBg, domText] = domStyle.split('|');

                return L.divIcon({ 
                    html: `<div class="${domBg} ${domText} font-bold rounded-full w-10 h-10 md:w-12 md:h-12 flex items-center justify-center border-[3px] border-white shadow-2xl text-sm md:text-base ring-4 ring-black/10 transition-transform hover:scale-110">${cluster.getChildCount()}</div>`, 
                    className: '', 
                    iconSize: L.point(48, 48) 
                });
            }
        });
        map.addLayer(markerCluster);

        // DRAG HANDLE SIDEBAR
        const sidebar = document.getElementById('sidebar');
        const dragHandle = document.getElementById('drag-handle');
        let isResizing = false;

        dragHandle.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            e.preventDefault(); 
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            let newWidth = e.clientX;
            if (newWidth > 320 && newWidth < window.innerWidth * 0.7) {
                sidebar.style.width = newWidth + 'px';
                if(map) map.invalidateSize(); 
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = 'default';
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            fetch(API_URL)
                .then(res => res.json())
                .then(data => {
                    if(data.error) { alert(data.error); return; }
                    allData = data;
                    document.getElementById('loading-badge').classList.add('hidden');
                    applyFilters();
                    setTimeout(() => { map.invalidateSize(); }, 500);
                })
                .catch(err => {
                    alert("Koneksi gagal. Pastikan URL Apps Script sudah benar.");
                    document.getElementById('loading-badge').classList.add('hidden');
                });
        });

        function toggleSidebar() {
            if (sidebar.style.display === 'none') {
                sidebar.style.display = 'flex';
                sidebar.style.width = ''; 
            } else {
                sidebar.style.display = 'none';
            }
            setTimeout(() => { map.invalidateSize(); }, 50);
        }

        function toggleChart() {
            const panel = document.getElementById('chart-panel-content');
            const btn = document.getElementById('show-chart-btn');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                btn.classList.add('hidden');
            } else {
                panel.classList.add('hidden');
                btn.classList.remove('hidden');
            }
        }

        window.addEventListener('resize', () => { if(map) map.invalidateSize(); });

        function getSymbology(text, mode) {
            text = (text || "").toLowerCase();
            if (mode === 'E') {
                if (text.includes("tidak ada")) return { id: "e1", label: "Tidak Ada Bus Stop", bg: "bg-red-500", text: "text-white", hex: "#ef4444", icon: "fa-exclamation" };
                if (text.includes("terhalang")) return { id: "e2", label: "Ada, Namun Terhalang", bg: "bg-orange-500", text: "text-white", hex: "#f97316", icon: "fa-ban" };
                if (text.includes("rusak")) return { id: "e3", label: "Ada, Kondisi Rusak", bg: "bg-yellow-400", text: "text-gray-900", hex: "#facc15", icon: "fa-wrench" };
                if (text.includes("baik") || text.includes("ada")) return { id: "e4", label: "Ada, Kondisi Baik", bg: "bg-green-500", text: "text-white", hex: "#22c55e", icon: "fa-check" };
            } 
            else if (mode === 'F') {
                if (text.includes("rusak") || text.includes("vandalisme")) return { id: "f1", label: "Ada, Rusak / Vandalisme", bg: "bg-yellow-400", text: "text-gray-900", hex: "#facc15", icon: "fa-wrench" };
                if (text.includes("tidak ada")) return { id: "f2", label: "Tidak Ada Informasi", bg: "bg-red-500", text: "text-white", hex: "#ef4444", icon: "fa-triangle-exclamation" };
                if (text.includes("baik") || text.includes("ada")) return { id: "f3", label: "Ada, Kondisi Baik", bg: "bg-green-500", text: "text-white", hex: "#22c55e", icon: "fa-check" };
            }
            else if (mode === 'G') {
                if (text.includes("berbahaya")) return { id: "g1", label: "Berbahaya Untuk Berhenti", bg: "bg-red-500", text: "text-white", hex: "#ef4444", icon: "fa-bus-simple" }; 
                if (text.includes("kriminalitas") || text.includes("penerangan")) return { id: "g2", label: "Kurang Penerangan & Potensi Kriminalitas", bg: "bg-orange-500", text: "text-white", hex: "#f97316", icon: "fa-user-secret" }; 
                if (text.includes("bocor") || text.includes("pinggir")) return { id: "g3", label: "Perlu Halte & Petugas", bg: "bg-yellow-400", text: "text-gray-900", hex: "#facc15", icon: "fa-id-card" }; 
                if (text.includes("aman") || text.includes("mudah")) return { id: "g4", label: "Aman & Ramah Pelanggan", bg: "bg-green-500", text: "text-white", hex: "#22c55e", icon: "fa-check" };
            }
            return { id: "unk", label: "Data Tidak Spesifik", bg: "bg-gray-300", text: "text-gray-700", hex: "#d1d5db", icon: "fa-circle-question" };
        }

        function resetLegendAndFilter() {
            activeLegendFilter = null;
            applyFilters();
        }

        function toggleLegendFilter(id) {
            activeLegendFilter = (activeLegendFilter === id) ? null : id; 
            applyFilters();
        }

        function applyFilters() {
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            const routeVal = document.getElementById('route-input').value.toLowerCase(); 
            const viewMode = document.getElementById('view-mode').value;
            
            const modeNames = { 'E': 'Ketersediaan Bus Stop', 'F': 'Papan Informasi Rute', 'G': 'Kondisi Tempat Tunggu' };
            document.getElementById('chart-subtitle').innerText = "Berdasarkan " + modeNames[viewMode];

            markerCluster.clearLayers();
            let countTotalSearched = 0; 
            let countMapRendered = 0; 
            let summaryStats = {};

            allData.forEach(item => {
                const matchS = !searchVal || item.nama.toLowerCase().includes(searchVal);
                const matchR = !routeVal || (item.rute && item.rute.toLowerCase().includes(routeVal)); 

                if (matchS && matchR) {
                    countTotalSearched++;
                    
                    let valToEvaluate = item.kondisiE;
                    if(viewMode === 'F') valToEvaluate = item.kondisiF;
                    if(viewMode === 'G') valToEvaluate = item.kondisiG;

                    const sym = getSymbology(valToEvaluate, viewMode);
                    
                    if(!summaryStats[sym.id]) summaryStats[sym.id] = { id: sym.id, label: sym.label, count: 0, hex: sym.hex, bg: sym.bg, text: sym.text, icon: sym.icon };
                    summaryStats[sym.id].count++;

                    if (!activeLegendFilter || activeLegendFilter === sym.id) {
                        countMapRendered++;
                        const htmlIcon = `<div class="w-7 h-7 md:w-8 md:h-8 rounded-full ${sym.bg} ${sym.text} border-2 border-white flex items-center justify-center shadow-lg"><i class="fa-solid ${sym.icon} text-[11px] md:text-[13px]"></i></div>`;
                        const markerIcon = L.divIcon({ html: htmlIcon, className: '', iconSize: L.point(32,32), iconAnchor: [16,16] });
                        const marker = L.marker([item.lat, item.lng], { icon: markerIcon, customBg: sym.bg, customText: sym.text });
                        marker.bindPopup(() => createPopupContent(item, sym), { className: 'custom-popup' });
                        markerCluster.addLayer(marker);
                    }
                }
            });

            document.getElementById('score-total').innerText = activeLegendFilter ? `${countMapRendered} / ${countTotalSearched}` : countTotalSearched;
            updateScorecardAndChart(Object.values(summaryStats).sort((a,b) => b.count - a.count), countTotalSearched); 
        }

        function updateScorecardAndChart(statsArray, totalCount) {
            const legendDiv = document.getElementById('map-legend');
            legendDiv.innerHTML = '';
            
            let chartLabels = [];
            let chartData = [];
            let chartColors = [];

            statsArray.forEach(stat => {
                const percentage = totalCount > 0 ? ((stat.count / totalCount) * 100).toFixed(1) + '%' : '0%';
                
                const isActive = activeLegendFilter === stat.id;
                const opacityClass = (activeLegendFilter && !isActive) ? 'opacity-40 grayscale-[30%]' : 'opacity-100 hover:bg-blue-50';
                const ringClass = isActive ? 'ring-2 ring-tjblue ring-offset-2 bg-blue-50' : 'bg-gray-50';

                legendDiv.innerHTML += `
                    <div onclick="toggleLegendFilter('${stat.id}')" class="legend-item flex items-center justify-between ${ringClass} ${opacityClass} p-2 md:p-2.5 rounded-lg border border-gray-200 cursor-pointer transition-all duration-200">
                        <div class="flex items-center">
                            <div class="w-7 h-7 md:w-8 md:h-8 rounded-full ${stat.bg} ${stat.text} flex justify-center items-center mr-2 md:mr-3 shadow-sm shrink-0">
                                <i class="fa-solid ${stat.icon} text-xs md:text-sm"></i>
                            </div>
                            <span class="text-[10px] md:text-[11px] font-bold text-gray-700 w-32 md:w-44 leading-tight pointer-events-none">${stat.label}</span>
                        </div>
                        <div class="text-right pointer-events-none shrink-0">
                            <span class="text-base md:text-lg font-bold ${stat.text === 'text-white' ? stat.bg.replace('bg-', 'text-') : 'text-gray-900'} leading-none">${stat.count}</span>
                            <span class="block text-[9px] md:text-[10px] text-gray-400 font-bold mt-0.5">${percentage}</span>
                        </div>
                    </div>
                `;
                
                chartLabels.push(stat.label);
                chartData.push(stat.count);
                chartColors.push(stat.hex);
            });

            const canvasWrapper = document.getElementById('chart-panel-content').parentElement;
            if(window.getComputedStyle(canvasWrapper).display !== 'none') {
                const ctx = document.getElementById('donutChart').getContext('2d');
                if (currentChart) currentChart.destroy(); 

                currentChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: chartLabels,
                        datasets: [{ data: chartData, backgroundColor: chartColors, borderWidth: 2, borderColor: '#ffffff', hoverOffset: 6 }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: { padding: { bottom: 15 } },
                        cutout: '55%',
                        plugins: {
                            legend: { display: true, position: 'bottom', labels: { boxWidth: 12, padding: 10, font: { size: 11, family: 'PT Sans', weight: 'bold' }, color: '#4b5563' } },
                            tooltip: { bodyFont: { family: 'PT Sans' }, titleFont: { family: 'PT Sans' }, callbacks: { label: function(context) { return ` ${context.label}: ${context.raw} Titik`; } } },
                            datalabels: {
                                color: '#ffffff', 
                                font: { weight: 'bold', size: 12, family: 'PT Sans' }, 
                                formatter: (value, ctx) => {
                                    let sum = 0;
                                    let dataArr = ctx.chart.data.datasets[0].data;
                                    dataArr.map(data => { sum += data; });
                                    if(value === 0) return '';
                                    return (value * 100 / sum).toFixed(1) + "%";
                                }
                            }
                        }
                    }
                });
            }
        }

        function createPopupContent(item, sym) {
            let fixLink = item.dokumentasi;
            let btnDokumentasi = `<div class="flex-1 flex justify-center items-center text-[10px] text-gray-400 italic bg-gray-50 border-t border-gray-100 p-2">Foto tak tersedia</div>`;
            
            if(fixLink && fixLink.length > 5) {
                if(!fixLink.startsWith('http://') && !fixLink.startsWith('https://')) fixLink = 'https://' + fixLink; 
                btnDokumentasi = `<a href="${fixLink}" target="_blank" rel="noopener noreferrer" class="flex-1 flex justify-center items-center bg-tjblue hover:bg-blue-800 text-white font-bold py-2.5 md:py-3 text-[10px] md:text-[11px] uppercase tracking-widest transition"><i class="fa-solid fa-camera mr-1.5"></i> Dokumentasi</a>`;
            }

            const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lng}`;
            const btnDirections = `<a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" class="flex-1 flex justify-center items-center bg-tjorange hover:bg-yellow-500 text-tjblue font-bold py-2.5 md:py-3 text-[10px] md:text-[11px] uppercase tracking-widest transition border-r border-white/20"><i class="fa-solid fa-route mr-1.5"></i> Directions</a>`;

            return `
                <div class="flex flex-col bg-white rounded-xl font-['PT_Sans']">
                    <div class="${sym.bg} ${sym.text} px-4 py-3 flex items-center justify-between rounded-t-xl">
                        <div class="pr-2">
                            <h4 class="font-bold text-[13px] md:text-[15px] uppercase tracking-wider mb-1">${item.nama}</h4>
                            <span class="inline-block bg-white/20 backdrop-blur-sm text-${sym.text} text-[9px] md:text-[11px] px-2 py-0.5 rounded shadow-sm border border-white/30"><i class="fa-solid fa-route mr-1.5"></i>RUTE: <strong class="font-bold">${item.rute || '-'}</strong></span>
                        </div>
                        <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-white/20 flex items-center justify-center shrink-0 border border-white/40 shadow-inner">
                            <i class="fa-solid ${sym.icon} text-lg md:text-xl"></i>
                        </div>
                    </div>
                    
                    <div class="px-4 py-3 text-[11px] md:text-[12px] text-gray-600 space-y-2 bg-white">
                        <div class="flex flex-col border-b border-gray-100 pb-1.5">
                            <span class="font-bold text-gray-400 uppercase tracking-wider">Ketersediaan Bus Stop</span>
                            <span class="font-bold text-gray-800 text-[12px] md:text-[13px]">${item.kondisiE || '-'}</span>
                        </div>
                        <div class="flex flex-col border-b border-gray-100 pb-1.5">
                            <span class="font-bold text-gray-400 uppercase tracking-wider">Papan Informasi Rute</span>
                            <span class="font-bold text-gray-800 text-[12px] md:text-[13px]">${item.kondisiF || '-'}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-bold text-gray-400 uppercase tracking-wider">Kondisi Tempat Tunggu</span>
                            <span class="font-bold text-gray-800 text-[12px] md:text-[13px]">${item.kondisiG || '-'}</span>
                        </div>
                    </div>
                    
                    <div class="px-4 py-2.5 bg-yellow-50/50 border-t border-gray-100">
                        <span class="block text-[10px] font-bold text-gray-500 uppercase mb-1"><i class="fa-solid fa-comment-dots mr-1"></i> Catatan Surveyor</span>
                        <p class="text-[11px] md:text-[12px] text-gray-700 leading-relaxed">${item.keterangan || '<span class="italic opacity-50">Tidak ada catatan</span>'}</p>
                    </div>
                    
                    <div class="flex w-full rounded-b-xl overflow-hidden">
                        ${btnDirections}
                        ${btnDokumentasi}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
