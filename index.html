<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kondisi Bus Stop</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <script>
        tailwind.config = { theme: { extend: { colors: { tjblue: '#06367c', tjorange: '#F2A900' } } } }
    </script>
    <style>
        html, body { height: 100%; margin: 0; background-color: #f8fafc; font-family: 'PT Sans', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 10; }
        
        .custom-popup .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 12px; border: none; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .custom-popup .leaflet-popup-content { margin: 0; width: 280px !important; }
        @media (min-width: 768px) { .custom-popup .leaflet-popup-content { width: 340px !important; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        
        .legend-item { transition: all 0.2s ease-in-out; }
        .legend-item:hover { transform: translateX(5px); }
        .leaflet-control-layers { border-radius: 8px !important; border: 2px solid #e2e8f0 !important; font-family: 'PT Sans', sans-serif; font-weight: bold; background-color: rgba(255,255,255,0.95) !important; backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="bg-tjblue text-white shadow-xl z-50 flex justify-between items-center px-3 md:px-6 py-2 md:py-3 shrink-0">
        <div class="flex items-center w-3/4 md:w-auto">
            <button onclick="toggleSidebar()" class="mr-3 md:mr-4 hover:text-tjorange transition p-1 text-lg md:text-xl"><i class="fa-solid fa-bars"></i></button>
            <img src="TJ-Putih.png" alt="Logo Transjakarta" class="h-6 md:h-10 drop-shadow-md shrink-0">
            <div class="min-w-0 ml-2 md:ml-4">
                <h1 class="font-bold text-sm md:text-xl leading-tight tracking-wide truncate">Dashboard Kondisi Bus Stop</h1>
                <p class="text-[8px] md:text-xs text-blue-200 font-bold tracking-widest uppercase opacity-90 truncate">Layanan Mikrotrans dan Non-BRT</p>
            </div>
        </div>
        <div id="loading-badge" class="px-2 md:px-5 py-1 md:py-2 text-[9px] md:text-xs bg-tjorange text-tjblue font-bold rounded-full animate-pulse shadow-md flex items-center shrink-0">
            <i class="fa-solid fa-satellite-dish mr-1 md:mr-2 animate-spin"></i> <span class="hidden md:inline">Mensinkronisasi Data...</span><span class="inline md:hidden">Sync...</span>
        </div>
    </header>

    <div class="flex flex-col md:flex-row flex-1 overflow-hidden relative">
        <aside id="sidebar" class="w-full md:w-[26rem] md:min-w-[20rem] md:max-w-[40rem] h-[55vh] md:h-full bg-white shadow-2xl z-40 flex flex-col border-t md:border-r border-gray-200 shrink-0 relative order-2 md:order-1 transition-all duration-300">
            <div class="p-4 md:p-6 flex-1 overflow-y-auto overflow-x-hidden space-y-5 md:space-y-6">
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-[11px] md:text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5"><i class="fa-solid fa-magnifying-glass mr-1.5 text-tjblue"></i> Cari Nama Halte</label>
                        <input type="text" id="search-input" oninput="processAndRenderLayers()" placeholder="Ketik Nama Halte..." class="w-full text-sm px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:border-tjblue focus:ring-2 focus:ring-blue-100 outline-none transition shadow-inner">
                    </div>
                    <div>
                        <label class="block text-[11px] md:text-xs font-bold uppercase tracking-wider text-gray-500 mb-1.5"><i class="fa-solid fa-route mr-1.5 text-tjblue"></i> Cari Rute</label>
                        <input type="text" id="route-input" oninput="processAndRenderLayers()" placeholder="JAK.10 atau 6K..." class="w-full text-sm px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:border-tjblue focus:ring-2 focus:ring-blue-100 outline-none transition shadow-inner">
                    </div>
                </div>

                <div class="pt-2 border-t border-gray-100 space-y-3">
                    <h4 class="text-[11px] md:text-xs font-bold uppercase tracking-wider text-gray-500"><i class="fa-solid fa-filter mr-1.5 text-tjorange"></i> Filter Wilayah</h4>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[9px] md:text-[10px] font-bold text-tjblue uppercase mb-1">Kab/Kota</label>
                            <select id="filter-kab" onchange="updateDistrictFilter()" class="w-full text-[11px] px-3 py-2 border border-gray-200 rounded focus:border-tjblue focus:ring-1 focus:ring-blue-100 outline-none transition cursor-pointer">
                                <option value="ALL">Semua</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[9px] md:text-[10px] font-bold text-tjblue uppercase mb-1">Kecamatan</label>
                            <select id="filter-kec" onchange="updateKelurahanFilter()" class="w-full text-[11px] px-3 py-2 border border-gray-200 rounded focus:border-tjblue focus:ring-1 focus:ring-blue-100 outline-none transition cursor-pointer">
                                <option value="ALL">Semua</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[9px] md:text-[10px] font-bold text-tjblue uppercase mb-1">Kelurahan</label>
                        <select id="filter-kel" onchange="processAndRenderLayers()" class="w-full text-[11px] px-3 py-2 border border-gray-200 rounded focus:border-tjblue focus:ring-1 focus:ring-blue-100 outline-none transition cursor-pointer">
                            <option value="ALL">Semua</option>
                        </select>
                    </div>
                </div>

                <div class="pt-2 border-t border-gray-100 space-y-2">
                    <label class="block text-[11px] md:text-xs font-bold uppercase tracking-wider text-gray-500"><i class="fa-solid fa-layer-group mr-1.5 text-tjblue"></i> Lihat Persebaran Dari:</label>
                    <select id="view-mode" onchange="resetLegendAndFilter()" class="w-full text-sm px-4 py-2.5 border-2 border-gray-200 rounded-lg text-gray-800 font-bold focus:border-tjorange focus:ring-0 outline-none cursor-pointer shadow-sm transition">
                        <option value="E">Ketersediaan Bus Stop</option>
                        <option value="F">Ketersediaan Papan Informasi Rute</option>
                        <option value="G">Kondisi Tempat Tunggu Pelanggan</option>
                    </select>
                </div>

                <div class="pt-1 md:pt-2">
                    <div class="flex justify-between items-end mb-3 border-b border-gray-200 pb-2">
                        <h3 class="text-[11px] md:text-xs font-bold text-gray-500 uppercase"><i class="fa-solid fa-list-check mr-1"></i> Keterangan</h3>
                        <span class="text-[10px] md:text-[11px] font-bold text-tjblue bg-blue-50 px-2.5 py-1 rounded">Total: <span id="score-total">0</span> Titik</span>
                    </div>
                    <div id="map-legend" class="space-y-2 md:space-y-2.5"></div>
                </div>

            </div>
            <div id="drag-handle" class="hidden md:block absolute top-0 right-0 w-2 h-full cursor-col-resize bg-transparent hover:bg-blue-100 active:bg-blue-200 z-50"></div>
        </aside>

        <main class="w-full h-[45vh] md:h-full md:flex-1 relative bg-gray-100 order-1 md:order-2 shrink-0 md:shrink z-10 flex flex-col min-w-[30%]">
            
            <div id="hierarchy-indicator" class="absolute top-4 left-1/2 transform -translate-x-1/2 z-[1000] bg-tjblue text-white px-4 py-1.5 rounded-full shadow-lg text-[10px] md:text-xs font-bold flex items-center border border-blue-400 opacity-90 transition-opacity">
                <i class="fa-solid fa-magnifying-glass-location mr-2 text-tjorange animate-pulse"></i>
                Klaster: <span id="indicator-level" class="ml-1 font-extrabold uppercase">Memuat...</span>
            </div>

            <div id="map" class="flex-1 w-full h-full"></div>
            
            <div class="hidden md:block absolute top-5 right-5 z-[1000]">
                <div id="chart-panel-content" class="w-[340px] bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl p-5 border border-gray-100 relative transition-all duration-300">
                    <button onclick="toggleChart()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
                    <h3 class="text-xs font-bold text-tjblue uppercase tracking-wide text-center mb-1 pr-4">Proporsi Keseluruhan</h3>
                    <p id="chart-subtitle" class="text-[10px] text-gray-400 text-center uppercase tracking-widest mb-4 pr-4">Berdasarkan Bus Stop</p>
                    <div class="relative w-full min-h-[250px] flex justify-center items-center"><canvas id="donutChart"></canvas></div>
                </div>
                <button id="show-chart-btn" onclick="toggleChart()" class="hidden bg-white hover:bg-gray-50 text-tjblue font-bold px-4 py-2.5 rounded-lg shadow-xl border border-gray-200 transition">
                    <i class="fa-solid fa-chart-pie mr-2 text-tjorange"></i>Tampilkan Grafik
                </button>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <script>
        // API BARU TER-UPDATE
        const API_URL = "https://script.google.com/macros/s/AKfycbzljx_Q99VtfASZitj576o3DyChbBu6p7t0J9OSnnnpWOx53Q7CUJZgygIo22rVeBHp/exec";

        let map, allData = [];
        let currentChart = null, activeLegendFilter = null; 
        
        let boundaryData = { kabupaten: null, kecamatan: null, kelurahan: null };
        let polyCenters = { KAB: {}, KEC: {}, KEL: {} }; 

        let polyLayerKab = L.layerGroup();
        let polyLayerKec = L.layerGroup();
        let polyLayerKel = L.layerGroup();
        let polyLayerLineDesa = L.layerGroup(); 

        let layerAdminKab = L.layerGroup();
        let layerAdminKec = L.layerGroup();
        let layerAdminKel = L.layerGroup();
        
        // PERBAIKAN: Radius Sangat Kecil (4 px) Sesuai Instruksi
        let layerTitikDetil = L.markerClusterGroup({
            chunkedLoading: true, 
            maxClusterRadius: 4, 
            disableClusteringAtZoom: 18, 
            iconCreateFunction: function(cluster) {
                const markers = cluster.getAllChildMarkers();
                const bg = markers[0].options.customBg || "bg-tjblue";
                const text = markers[0].options.customText || "text-white";
                return L.divIcon({ 
                    html: `<div class="${bg} ${text} font-bold rounded-full w-8 h-8 flex items-center justify-center border-2 border-white shadow-xl text-[11px] ring-2 ring-black/10">${cluster.getChildCount()}</div>`, 
                    className: '', iconSize: L.point(32, 32) 
                });
            }
        });

        Chart.register(ChartDataLabels);

        const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' });
        const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' });
        const googleStreets = L.tileLayer('http://mt0.google.com/vt/lyrs=m&hl=en&x={x}&y={y}&z={z}', { attribution: '© Google Maps' });
        const googleSat = L.tileLayer('http://mt0.google.com/vt/lyrs=s&hl=en&x={x}&y={y}&z={z}', { attribution: '© Google Satellite' });

        const jabodetabekBounds = L.latLngBounds(L.latLng(-6.8, 106.5), L.latLng(-5.9, 107.2));

        map = L.map('map', { 
            maxZoom: 18, minZoom: 10, maxBounds: jabodetabekBounds, maxBoundsViscosity: 1.0, 
            zoomControl: false, layers: [cartoLight]
        }).setView([-6.2088, 106.8456], 12);
        
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.control.layers({ "Carto Light": cartoLight, "Carto Dark": cartoDark, "Google Maps": googleStreets, "Google Satelit": googleSat }, null, { position: 'bottomleft' }).addTo(map);

        const sidebar = document.getElementById('sidebar'), dragHandle = document.getElementById('drag-handle');
        let isResizing = false;
        dragHandle.addEventListener('mousedown', (e) => { isResizing = true; document.body.style.cursor = 'col-resize'; e.preventDefault(); });
        document.addEventListener('mousemove', (e) => { if (!isResizing) return; let newWidth = e.clientX; if (newWidth > 320 && newWidth < window.innerWidth * 0.7) { sidebar.style.width = newWidth + 'px'; if(map) map.invalidateSize(); } });
        document.addEventListener('mouseup', () => { if (isResizing) { isResizing = false; document.body.style.cursor = 'default'; } });

        map.on('zoomend', () => { if(allData.length > 0) updateActiveMapLayer(); });

        function normName(str) {
            return (str || "")
                .replace(/KOTA ADMINISTRASI\s|KOTA ADM\.\s|KOTA\s|KABUPATEN\s|KAB\.\s/ig, '')
                .replace(/KECAMATAN\s|KEC\.\s/ig, '')
                .replace(/KELURAHAN\s|KEL\.\s|DESA\s/ig, '')
                .trim().toUpperCase();
        }

        // FUNGSI PENGAMAN: Tarik GeoJSON tapi jangan error jika gagal 1 file
        const fetchGeoJSON = async (url) => {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (err) {
                console.warn(`[Aman] GeoJSON ${url} tidak ditemukan atau gagal dimuat.`);
                return { type: "FeatureCollection", features: [] }; // Return struktur kosong
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            // Memuat data secara independen untuk mencegah blank page
            Promise.all([
                fetch(API_URL).then(res => res.json()),
                fetchGeoJSON('Jakarta_Kabupaten_Kota.geojson'),
                fetchGeoJSON('Jakarta_Kecamatan.geojson'),
                fetchGeoJSON('Jakarta_Desa.geojson'),
                fetchGeoJSON('Jakarta_Desa_Line.geojson')
            ])
            .then(([data, shpKab, shpKec, shpKel, shpKelGaris]) => {
                if(data.error) { alert(data.error); return; }
                allData = data;
                boundaryData.kabupaten = shpKab;
                boundaryData.kecamatan = shpKec;
                boundaryData.kelurahan = shpKel;
                boundaryData.kel_polyline = shpKelGaris; 

                extractGeoJsonCenters();
                initStaticPolygons(shpKab, shpKec, shpKel, shpKelGaris);

                document.getElementById('loading-badge').classList.add('hidden');
                
                // Memicu Update Berantai (Kabupaten -> Kecamatan -> Kelurahan)
                populateFilterDropdowns(); 
                setTimeout(() => { map.invalidateSize(); }, 500);
            }).catch(err => { 
                alert("Data Spreadsheet gagal dimuat. Pastikan URL API sudah benar."); 
                document.getElementById('loading-badge').classList.add('hidden');
            });
        });

        function extractGeoJsonCenters() {
            const tempLayer = L.geoJSON(null);
            boundaryData.kabupaten.features.forEach(f => {
                tempLayer.addData(f);
                polyCenters.KAB[normName(f.properties.WADMKK || f.properties.NAMOBJ)] = tempLayer.getBounds().getCenter();
                tempLayer.clearLayers();
            });
            boundaryData.kecamatan.features.forEach(f => {
                tempLayer.addData(f);
                polyCenters.KEC[normName(f.properties.WADMKC || f.properties.NAMOBJ)] = tempLayer.getBounds().getCenter();
                tempLayer.clearLayers();
            });
            boundaryData.kelurahan.features.forEach(f => {
                tempLayer.addData(f);
                polyCenters.KEL[normName(f.properties.WADMKD || f.properties.NAMOBJ)] = tempLayer.getBounds().getCenter();
                tempLayer.clearLayers();
            });
        }

        function initStaticPolygons(shpKab, shpKec, shpKel, shpKelGaris) {
            L.geoJSON(shpKab, {
                style: { color: "#06367c", weight: 2, opacity: 0.8, fillColor: "#06367c", fillOpacity: 0.1 },
                onEachFeature: function(feature, layer) {
                    const nama = feature.properties.WADMKK || feature.properties.NAMOBJ || "Wilayah";
                    layer.bindTooltip(`<div class="text-[10px] md:text-[11px] font-bold text-tjblue uppercase tracking-widest bg-white/95 px-3 py-1.5 rounded shadow-lg border border-tjblue/20">${nama}</div>`, { permanent: false, sticky: true });
                }
            }).addTo(polyLayerKab);

            L.geoJSON(shpKec, {
                style: { color: "#06367c", weight: 2, opacity: 0.8, fillColor: "#06367c", fillOpacity: 0.1 },
                onEachFeature: function(feature, layer) {
                    const nama = feature.properties.WADMKC || feature.properties.NAMOBJ || "Wilayah";
                    layer.bindTooltip(`<div class="text-[10px] md:text-[11px] font-bold text-tjblue uppercase tracking-widest bg-white/95 px-3 py-1.5 rounded shadow-lg border border-tjblue/20">${nama}</div>`, { permanent: false, sticky: true });
                }
            }).addTo(polyLayerKec);

            L.geoJSON(shpKel, {
                style: { color: "#06367c", weight: 2, opacity: 0.8, fillColor: "#06367c", fillOpacity: 0.1 },
                onEachFeature: function(feature, layer) {
                    const nama = feature.properties.WADMKD || feature.properties.NAMOBJ || "Wilayah";
                    layer.bindTooltip(`<div class="text-[10px] md:text-[11px] font-bold text-tjblue uppercase tracking-widest bg-white/95 px-3 py-1.5 rounded shadow-lg border border-tjblue/20">${nama}</div>`, { permanent: false, sticky: true });
                }
            }).addTo(polyLayerKel);

            L.geoJSON(shpKelGaris, {
                style: { color: "#06367c", weight: 1.5, opacity: 0.5, dashArray: '5, 5', fill: false }
            }).addTo(polyLayerLineDesa);
        }

        // PERBAIKAN LOGIKA DROPDOWN CASCADING (Bebas dari masalah "Semua")
        function populateFilterDropdowns() {
            const kabupatenSel = document.getElementById('filter-kab');
            const kabupatenSet = new Set();
            allData.forEach(item => {
                const name = normName(item.kabupaten);
                if(name && name !== "TANPA KABUPATEN") kabupatenSet.add(name);
            });
            [...kabupatenSet].sort().forEach(kab => { kabupatenSel.add(new Option(kab, kab)); });
            
            // Panggil untuk mengisi kecamatan
            updateDistrictFilter();
        }

        function updateDistrictFilter() {
            const kabVal = document.getElementById('filter-kab').value;
            const kecSel = document.getElementById('filter-kec');
            
            kecSel.innerHTML = '<option value="ALL">Semua</option>';
            
            const kecSet = new Set();
            allData.forEach(item => {
                // Jika "Semua", ambil dari semua Kabupaten
                const matchKab = kabVal === 'ALL' || normName(item.kabupaten) === kabVal;
                if(matchKab && item.kecamatan) {
                    const kecName = normName(item.kecamatan);
                    if(kecName && kecName !== "TANPA KECAMATAN") kecSet.add(kecName);
                }
            });
            [...kecSet].sort().forEach(kec => { kecSel.add(new Option(kec, kec)); });
            
            // Lanjut ke kelurahan
            updateKelurahanFilter();
        }

        function updateKelurahanFilter() {
            const kabVal = document.getElementById('filter-kab').value;
            const kecVal = document.getElementById('filter-kec').value;
            const kelSel = document.getElementById('filter-kel');
            
            kelSel.innerHTML = '<option value="ALL">Semua</option>';
            
            const kelSet = new Set();
            allData.forEach(item => {
                const matchKab = kabVal === 'ALL' || normName(item.kabupaten) === kabVal;
                const matchKec = kecVal === 'ALL' || normName(item.kecamatan) === kecVal;
                
                if(matchKab && matchKec && item.kelurahan) {
                    const kelName = normName(item.kelurahan);
                    if(kelName && kelName !== "TANPA KELURAHAN") kelSet.add(kelName);
                }
            });
            [...kelSet].sort().forEach(kel => { kelSel.add(new Option(kel, kel)); });
            
            // Akhirnya render peta
            processAndRenderLayers();
        }

        function toggleSidebar() { sidebar.style.display = sidebar.style.display === 'none' ? 'flex' : 'none'; if(sidebar.style.display==='flex') sidebar.style.width = ''; setTimeout(() => { map.invalidateSize(); }, 50); }
        function toggleChart() { const p = document.getElementById('chart-panel-content'), b = document.getElementById('show-chart-btn'); p.classList.toggle('hidden'); b.classList.toggle('hidden'); }
        window.addEventListener('resize', () => { if(map) map.invalidateSize(); });

        function getSymbology(text, mode) {
            text = (text || "").toLowerCase();
            if (mode === 'E') {
                if (text.includes("tidak ada")) return { id: "e1", label: "Tidak Ada Bus Stop", bg: "bg-red-500", text: "text-white", hex: "#ef4444", icon: "fa-exclamation" };
                if (text.includes("terhalang")) return { id: "e2", label: "Ada, Namun Terhalang", bg: "bg-orange-500", text: "text-white", hex: "#f97316", icon: "fa-ban" };
                if (text.includes("rusak")) return { id: "e3", label: "Ada, Kondisi Rusak", bg: "bg-yellow-400", text: "text-gray-900", hex: "#facc15", icon: "fa-wrench" };
                if (text.includes("baik") || text.includes("ada")) return { id: "e4", label: "Ada, Kondisi Baik", bg: "bg-green-500", text: "text-white", hex: "#22c55e", icon: "fa-check" };
            } else if (mode === 'F') {
                if (text.includes("rusak") || text.includes("vandalisme")) return { id: "f1", label: "Ada, Rusak / Vandalisme", bg: "bg-yellow-400", text: "text-gray-900", hex: "#facc15", icon: "fa-wrench" };
                if (text.includes("tidak ada")) return { id: "f2", label: "Tidak Ada Informasi", bg: "bg-red-500", text: "text-white", hex: "#ef4444", icon: "fa-triangle-exclamation" };
                if (text.includes("baik") || text.includes("ada")) return { id: "f3", label: "Ada, Kondisi Baik", bg: "bg-green-500", text: "text-white", hex: "#22c55e", icon: "fa-check" };
            } else if (mode === 'G') {
                if (text.
